kind = "web"
previewPath = "/"
title = "EthicalHacking.ai"
version = "1.0.0"
id = "artifacts/ethical-hacking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20423

[services.development]
run = "pnpm --filter @workspace/ethical-hacking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ethical-hacking", "run", "build" ]
publicDir = "artifacts/ethical-hacking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20423"
BASE_PATH = "/"
